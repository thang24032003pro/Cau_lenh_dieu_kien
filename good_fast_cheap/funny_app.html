<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Ứng dụng vui</title>
    <style>
        body { text-align: center; padding-top: 100px; font-family: Arial, sans-serif; }
        #btnNo { position: absolute; width: 100px; height: 40px; transition: 0.1s; }
        #btnYes { width: 100px; height: 40px; cursor: pointer; }
    </style>
</head>
<body>
    <h1 id="question">Học code có khó không?</h1>
    <button type="button" id="btnYes" onclick="sayYes()">CÓ</button>
    <button type="button" id="btnNo" onmouseover="moveButton()">KHÔNG</button>

    <script>
        function sayYes() {
            alert("Đúng vậy, bạn thật tự tin và tuyệt vời!");
        }

        function moveButton() {
            let x = Math.random() * window.innerWidth;
            let y = Math.random() * window.innerHeight;

            if (x < window.innerWidth) {
                if (y < window.innerHeight) {
                    if (x > 100 && y > 100) {
                        document.getElementById("btnNo").style.left = x + "px";
                        document.getElementById("btnNo").style.top = y + "px";
                    } else {
                        document.getElementById("btnNo").style.left = "200px";
                        document.getElementById("btnNo").style.top = "200px";
                    }
                }
            }
        }
    </script>
</body>
</html>
