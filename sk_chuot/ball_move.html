<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Di chuyển quả bóng</title>
</head>
<body onload="init()">
    <form>
        <img id="myImage" src="https://upload.wikimedia.org/wikipedia/commons/e/ec/Soccer_ball.svg" 
             style="width: 100px; height: 100px; position: relative; left: 0px;" />
        <p>
            <input type="button" value="Click Me" onclick="moveRight();" />
        </p>
    </form>

    <script>        
    let imgObj = null;

        function init() {
            imgObj = document.getElementById('myImage');
            imgObj.style.position = 'relative';
            imgObj.style.left = '0px';
        }

        function moveRight() {
            imgObj.style.left = parseInt(imgObj.style.left) + 10 + 'px';
        }
    </script>
</body>
</html>
