<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tính chỉ số BMI - Sức khỏe cộng đồng</title>
</head>
<body>
    <h2>Chương trình tính chỉ số BMI</h2>
    
    <script>
        let weight = parseFloat(prompt("Nhập cân nặng của bạn (kg):", 0));
        let height = parseFloat(prompt("Nhập chiều cao của bạn (mét):", 0));

        if (isNaN(weight) || isNaN(height) || height <= 0 || weight <= 0) {
            document.write("Dữ liệu nhập vào không hợp lệ. Vui lòng tải lại trang.");
        } else {
            let bmi = weight / Math.pow(height, 2);
            
            document.write("Chỉ số BMI của bạn là: <b>" + bmi.toFixed(2) + "</b><br>");

            document.write("Phân loại: ");
            if (bmi < 18.5) {
                document.write("<b>Underweight</b> (Thiếu cân)");
            } else if (bmi < 25.0) {
                document.write("<b>Normal</b> (Bình thường)");
            } else if (bmi < 30.0) {
                document.write("<b>Overweight</b> (Thừa cân)");
            } else {
                document.write("<b>Obese</b> (Béo phì)");
            }
        }
    </script>
</body>
</html>
