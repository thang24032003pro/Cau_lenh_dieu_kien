<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Check</title>
</head>
<body>
    <script>
        let value = prompt('Type a number', 0);
        // Chuyển đổi sang switch-case theo bước 5
        switch (true) {
            case (value > 0):
                alert(1);
                break;
            case (value < 0):
                alert(-1);
                break;
            default:
                alert(0);
        }
    </script>
</body>
</html>
